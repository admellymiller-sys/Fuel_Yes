<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг АЗС</title>
    <!-- Подключаем официальные и стабильные Яндекс.Карты -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <!-- Скрипт Telegram WebApp -->
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1e1e1e; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // Сообщаем Telegram, что приложение готово
    const tg = window.Telegram.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    // Ждем загрузки Яндекс.Карт
    ymaps.ready(init);

    function init() {
        // Создаем карту с центром в СПб (координаты изменятся автоматически на регион пользователя позже)
        const myMap = new ymaps.Map("map", {
            center: [59.93863, 30.31413],
            zoom: 11,
            controls: ['zoomControl', 'geolocationControl']
        });

        // ТЕСТОВЫЕ МАРКЕРЫ АЗС
        const azsData = [
            { name: "Газпромнефть №1", coords: [59.9400, 30.3100], text: "АИ-95: 56.20₽ | ДТ: 65.10₽ (В наличии)" },
            { name: "Лукойл №12", coords: [59.9200, 30.3500], text: "АИ-95: 57.50₽ | ДТ: Закончился ❌" }
        ];

        // Добавляем их на карту
        azsData.forEach(azs => {
            const placemark = new ymaps.Placemark(azs.coords, {
                balloonContentHeader: azs.name,
                balloonContentBody: azs.text
            }, {
                preset: 'islands#blueGasStationIcon' // Красивая иконка заправки
            });
            myMap.geoObjects.add(placemark);
        });
    }
</script>
</body>
</html>
