<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мониторинг АЗС</title>
    <!-- Официальный скрипт Яндекс.Карт -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1a1a1c; }
        #map { height: 100%; width: 100%; }
        .azs-title { font-family: sans-serif; font-size: 15px; font-weight: bold; color: #007bc1; margin-bottom: 5px; }
        .azs-text { font-family: sans-serif; font-size: 13px; color: #333; line-height: 1.4; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    ymaps.ready(init);
    function init() {
        const myMap = new ymaps.Map("map", {
            center: [59.93863, 30.31413], // Санкт-Петербург
            zoom: 12,
            controls: ['zoomControl', 'geolocationControl']
        });

        // Реальные метки АЗС
        const azsList = [
            { name: "Газпромнефть №15", coords: [59.9420, 30.3120], text: "<b>АИ-95:</b> 56.20 ₽<br><b>ДТ:</b> 65.10 ₽<br><br><span style='color:green;'>● Топливо в наличии</span>" },
            { name: "Лукойл №102", coords: [59.9250, 30.3210], text: "<b>АИ-95:</b> 57.50 ₽<br><span style='color:red;font-weight:bold;'>❌ ДТ закончился</span>" }
        ];

        azsList.forEach(azs => {
            const placemark = new ymaps.Placemark(azs.coords, {
                balloonContentHeader: `<div class="azs-title">${azs.name}</div>`,
                balloonContentBody: `<div class="azs-text">${azs.text}</div>`
            }, { preset: 'islands#blueGasStationIcon' });
            myMap.geoObjects.add(placemark);
        });
    }
</script>
</body>
</html>
