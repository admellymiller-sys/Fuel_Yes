<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мониторинг АЗС СПб</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background-color: #141416; color: #fff; display: flex; justify-content: center; align-items: center; }
        .screen { width: 100vw; height: 100vh; background: #1c1d22; display: flex; flex-direction: column; position: relative; }
        .header { background: #23242a; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; color: #4caf50; border-bottom: 1px solid #2e3038; }
        
        /* Настоящая интерактивная сетка дорог без внешних загрузок */
        .map-area { flex-grow: 1; position: relative; background: #18191d; overflow: hidden; background-image: radial-gradient(#2a2b36 1px, transparent 1px); background-size: 20px 20px; }
        .road-h { position: absolute; width: 100%; height: 14px; background: #282930; top: 40%; }
        .road-v { position: absolute; width: 14px; height: 100%; background: #282930; left: 50%; }
        .river { position: absolute; width: 100%; height: 40px; background: #1d2736; top: 15%; transform: rotate(-5deg); display: flex; align-items: center; padding-left: 20px; color: #3b5275; font-size: 12px; font-weight: bold; }
        
        /* Маркеры заправок */
        .pin { position: absolute; width: 32px; height: 32px; background: #ff9800; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); cursor: pointer; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        .pin::after { content: '⛽'; transform: rotate(45deg); font-size: 16px; }
        .pin.green { background: #4caf50; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.7); } 70% { box-shadow: 0 0 0 10px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }
        
        /* Всплывающее меню с ценами */
        .info-box { background: #23242a; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #2e3038; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #4caf50; }
        .price-line { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; color: #ccc; }
        .price { font-weight: bold; color: #ff9800; }
    </style>
</head>
<body>

<div class="screen">
    <div class="header">📍 ОНЛАЙН-КАРТА АЗС САНКТ-ПЕТЕРБУРГ</div>
    
    <div class="map-area">
        <div class="river">река НЕВА</div>
        <div class="road-h"></div>
        <div class="road-v"></div>
        
        <!-- Заправка 1 -->
        <div class="pin green" style="top: 32%; left: 35%;" onclick="showAzs('Газпромнефть №15', '56.20 ₽', '65.10 ₽', '🟢 Топливо в наличии')"></div>
        <!-- Заправка 2 -->
        <div class="pin" style="top: 55%; left: 55%;" onclick="showAzs('Лукойл №102', '57.50 ₽', 'Закончился ❌', '🔴 Нет дизеля в цистерне')"></div>
    </div>

    <div class="info-box" id="infoBox">
        <div class="title" id="azsName">👉 Нажмите на значок заправки</div>
        <div id="azsPrices" style="display: none;">
            <div class="price-line"><span>Бензин АИ-95:</span> <span class="price" id="p95">0</span></div>
            <div class="price-line"><span>Дизель ДТ:</span> <span class="price" id="pDt">0</span></div>
            <div id="azsStatus" style="font-size: 13px; margin-top: 8px; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    function showAzs(name, p95, dt, status) {
        document.getElementById('azsPrices').style.display = 'block';
        document.getElementById('azsName').innerText = name;
        document.getElementById('p95').innerText = p95;
        document.getElementById('pDt').innerText = dt;
        
        const statusBlock = document.getElementById('azsStatus');
        statusBlock.innerText = status;
        statusBlock.style.color = status.includes('🟢') ? '#4caf50' : '#f44336';
    }
</script>
</body>
</html>
