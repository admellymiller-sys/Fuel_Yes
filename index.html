<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг АЗС РФ</title>
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background-color: #1a1a1a; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-container { width: 90%; max-width: 400px; background: #262626; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); text-align: center; border: 1px solid #333; }
        h2 { margin-top: 0; color: #4caf50; font-size: 22px; }
        .map-mock { width: 100%; height: 200px; background: radial-gradient(circle, #2d4a2e 0%, #1c2b1d 100%); border-radius: 12px; margin: 15px 0; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border: 1px dashed #4caf50; overflow: hidden; }
        .grid-line { position: absolute; background: rgba(76, 175, 80, 0.1); }
        .station { position: absolute; width: 12px; height: 12px; background: #ff9800; border-radius: 50%; box-shadow: 0 0 10px #ff9800; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .station.green { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .info-block { background: #333; padding: 12px; border-radius: 8px; font-size: 14px; text-align: left; line-height: 1.5; margin-bottom: 10px; }
        .btn { background: #4caf50; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #45a049; }
    </style>
</head>
<body>

<div class="card-container">
    <h2>📍 Мониторинг АЗС РФ</h2>
    <p style="font-size: 14px; color: #aaa; margin: 0;">Интерактивный радар доступности топлива</p>
    
    <div class="map-mock">
        <!-- Сетка радара -->
        <div class="grid-line" style="width: 100%; height: 1px; top: 50%;"></div>
        <div class="grid-line" style="width: 1px; height: 100%; left: 50%;"></div>
        <!-- Тестовые АЗС (отобразятся точками прямо на экране) -->
        <div class="station green" style="top: 35%; left: 40%;" title="Газпромнефть"></div>
        <div class="station" style="top: 60%; left: 65%;" title="Лукойл"></div>
        <span style="font-size: 12px; color: #4caf50; z-index: 2; font-weight: bold; background: rgba(26,26,26,0.8); padding: 4px 8px; border-radius: 4px;">КАРТА АКТИВНА</span>
    </div>

    <div class="info-block">
        <b>🟢 АЗС Газпромнефть №1 (СПб):</b><br>
        ⛽️ АИ-95: 56.20₽ | 🐋 ДТ: 65.10₽<br>
        <span style="color: #4caf50;">● Топливо в наличии</span>
    </div>

    <div class="info-block">
        <b>🔴 АЗС Лукойл №12 (Трасса М-10):</b><br>
        ⛽️ АИ-95: 57.50₽ | ❌ ДТ: Закончился<br>
        <span style="color: #f44336;">● Ограничение по дизелю</span>
    </div>

    <button class="btn" onclick="tg.close()">Вернуться в бот</button>
</div>

<script>
    // Инициализация интерфейса Telegram Telegram WebApp
    const tg = window.Telegram.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }
</script>
</body>
</html>
