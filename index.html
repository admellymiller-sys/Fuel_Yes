<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мониторинг АЗС</title>
    <!-- Официальный скрипт Яндекс.Карт - работает без сбоев -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1a1a1c; }
        #map { height: 100%; width: 100%; }
        /* Красивый стиль карточки внутри карты */
        .azs-card { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #333; padding: 5px; min-width: 180px; }
        .azs-title { font-size: 15px; font-weight: bold; color: #007bc1; margin-bottom: 8px; }
        .fuel-price { font-weight: bold; color: #ff9800; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // Ждем полной загрузки Яндекса
    ymaps.ready(init);

    function init() {
        // Создаем карту с центром в Санкт-Петербурге
        const myMap = new ymaps.Map("map", {
            center: [59.93863, 30.31413], // Координаты СПб
            zoom: 12,
            controls: ['zoomControl', 'geolocationControl', 'typeSelector']
        });

        // База данных тестовых заправок
        const azsList = [
            { name: "Газпромнефть №15", coords: [59.9420, 30.3120], content: "⛽️ АИ-95: <span class='fuel-price'>56.20 ₽</span><br>🐋 ДТ: <span class='fuel-price'>65.10 ₽</span><br><br><span style='color:green;'>● Топливо в наличии</span>" },
            { name: "Лукойл №102", coords: [59.9250, 30.3210], content: "⛽️ АИ-95: <span class='fuel-price'>57.50 ₽</span><br>❌ ДТ: <span style='color:red;font-weight:bold;'>Закончился</span>" },
            { name: "Татнефть №44", coords: [59.9310, 30.3550], content: "⛽️ АИ-95: <span class='fuel-price'>55.90 ₽</span><br>🐋 ДТ: <span class='fuel-price'>64.80 ₽</span><br><br><span style='color:green;'>● Очередей нет</span>" }
        ];

        // Добавляем заправки на карту
        azsList.forEach(azs => {
            const placemark = new ymaps.Placemark(azs.coords, {
                balloonContentHeader: `<div class="azs-title">${azs.name}</div>`,
                balloonContentBody: `<div class="azs-card">${azs.content}</div>`
            }, {
                preset: 'islands#blueGasStationIcon' // Специальная иконка заправки от Яндекса
            });
            myMap.geoObjects.add(placemark);
        });
    }
</script>
</body>
</html>
