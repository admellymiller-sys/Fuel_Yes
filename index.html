<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мониторинг АЗС</title>
    <!-- Здесь больше нет ключа Яндекса, страница полностью безопасна -->
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: -apple-system, sans-serif; background-color: #141416; color: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #23242a; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; color: #4caf50; border-bottom: 1px solid #2e3038; height: 50px; box-sizing: border-box; }
        #map { width: 100vw; height: calc(100vh - 140px); background: #1a1a1c; }
        .info-box { background: #23242a; padding: 15px; border-top: 1px solid #2e3038; box-shadow: 0 -4px 15px rgba(0,0,0,0.3); height: 90px; box-sizing: border-box; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 4px; color: #4caf50; }
        .price-line { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; color: #ccc; }
        .price { font-weight: bold; color: #ff9800; }
    </style>
</head>
<body>
    <div class="header">📍 КАРТА АЗС САНКТ-ПЕТЕРБУРГ</div>
    <div id="map"></div>
    <div class="info-box" id="infoBox">
        <div class="title" id="azsName">Загрузка защищенной карты...</div>
    </div>
</body>
</html>
