<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг АЗС РФ</title>
    <!-- Подключаем профессиональные карты Leaflet + темная тема -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #111; }
        #map { height: 100%; width: 100%; }
        /* Красивые кастомные карточки внутри карты */
        .leaflet-popup-content-wrapper { background: #222 !important; color: #fff !important; border-radius: 12px !important; padding: 5px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; }
        .leaflet-popup-tip { background: #222 !important; }
        .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #4caf50; }
        .popup-price { font-size: 14px; margin: 4px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .price-val { font-weight: bold; color: #ff9800; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 8px; text-align: center; width: 90%; }
        .status-ok { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-fail { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const tg = window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // Создаем карту с фокусом на Питер (координаты центра РФ или любого города подставятся автоматически позже)
    const map = L.map('map', { zoomControl: false }).setView([59.93863, 30.31413], 12);

    // Добавляем стильную темную карту, как в навигаторах премиум-класса
    L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Данные заправок (в будущем они будут подгружаться из твоей базы данных в реальном времени)
    const azsPoints = [
        { name: "Газпромнефть №15", lat: 59.9420, lng: 30.3120, ai95: "56.20₽", dt: "65.10₽", status: "ok", statusText: "🟢 Топливо в наличии" },
        { name: "Лукойл №102", lat: 59.9250, lng: 30.3210, ai95: "57.50₽", dt: "Закончился ❌", status: "fail", statusText: "🔴 Дизеля нет в цистерне" },
        { name: "Татнефть №44", lat: 59.9310, lng: 30.3550, ai95: "55.90₽", dt: "64.80₽", status: "ok", statusText: "🟢 Очередей нет" }
    ];

    // Отрисовываем заправки на карте
    azsPoints.forEach(azs => {
        // Создаем маркер
        const marker = L.marker([azs.lat, azs.lng]).addTo(map);
        
        // Красивое наполнение карточки при клике на заправку
        const popupContent = `
            <div class="popup-title">⛽️ ${azs.name}</div>
            <div class="popup-price"><span>Бензин АИ-95:</span> <span class="price-val">${azs.ai95}</span></div>
            <div class="popup-price"><span>Дизель (ДТ):</span> <span class="price-val">${azs.dt}</span></div>
            <div class="status-badge ${azs.status === 'ok' ? 'status-ok' : 'status-fail'}">
                ${azs.statusText}
            </div>
        `;
        
        marker.bindPopup(popupContent);
    });
</script>
</body>
</html>
